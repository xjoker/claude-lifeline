name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS (self-contained by default)
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          # Linux (musl = fully static, zero dependencies)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
          # Windows (static CRT)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            rustflags: "-C target-feature=+crt-static"
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ matrix.rustflags || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux x86_64 musl toolchain
      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Linux ARM64 cross-compilation
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/claude-lifeline \
             claude-lifeline-${{ matrix.target }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\claude-lifeline.exe `
               claude-lifeline-${{ matrix.target }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: claude-lifeline-${{ matrix.target }}
          path: claude-lifeline-${{ matrix.target }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: claude-lifeline-*
