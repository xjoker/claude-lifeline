# claude-lifeline 配置文件
# 复制到 ~/.claude/claude-lifeline/config.toml 使用
# 所有选项默认为 true，按需关闭

[display]
context = true     # context window 段
five_hour = true   # 5h quota 段
seven_day = true   # 7d quota 段
edit_stats = true  # 代码改动量 +X -Y（standard 模式 dim 挂在 git 后面，
                   # mini 模式并入 git 色块。仅当 session 有增删时渲染）
layout = "auto"    # 布局: auto | single | multi | mini
                   #   auto   — 按终端宽度自动选择（窄则每段独占一行）
                   #   single — 强制单行（可能被终端截断）
                   #   multi  — 强制每段独占一行
                   #   mini   — 极简色块单行：模型/项目/git/ctx/5h/7d 全压缩

# 颜色切换阈值（可选；缺省使用下列默认值）
# 校验规则：yellow 必须 < red，且都在 [0, 100]；不合法时该对回退默认
[thresholds]
ctx_yellow_at       = 60.0   # ctx >= 该值 → 黄
ctx_red_at          = 70.0   # ctx >= 该值 → 红
ctx_token_detail_at = 85.0   # ctx >= 该值：standard 模式附加 (in:Xk c:Yk)

# 5h / 7d quota 独立配置（默认 7d 比 5h 更宽松，因为 7d 窗口更长）
five_hour_yellow_at = 75.0
five_hour_red_at    = 90.0
seven_day_yellow_at = 80.0
seven_day_red_at    = 90.0

# 超速容差（%）：used > pace + tolerance 才算超速。0 = 严格（任何超出即告警）
pace_tolerance      = 0.0
